  - id: em_sudden_stop
    name: EM Sudden Stop / Balance of Payments Crisis
    category: china_em
    description: >
      Current account deficit + external USD debt + capital flow reversal
      triggers currency collapse and potential contagion to EM peers. Calvo
      (1998) and the "original sin" literature (Eichengreen & Hausmann).
      Related to but distinct from the dollar wrecking ball — the wrecking
      ball is USD strength as the trigger, while sudden stops can be triggered
      by idiosyncratic EM factors (political crisis, fiscal blowout) that
      then spread via contagion. Turkey 2018, Argentina 2018, Asian crisis 1997.
    trigger_sources:
      - news
      - market_data
      - spreads
      - economic_data
    trigger_keywords:
      - EM crisis
      - capital flight
      - sudden stop
      - currency collapse
      - balance of payments
      - current account deficit
      - external debt
      - EM contagion
      - devaluation
      - IMF bailout
      - capital controls
      - foreign reserves
      - sovereign default
    chain_steps:
      - description: Idiosyncratic trigger in vulnerable EM economy
        observable: Political crisis, fiscal blowout, policy error, or external shock
        lag_days: [0, 2]
      - description: Capital flows reverse, currency collapses
        observable: EM FX drops >10%, foreign reserves deplete, bond yields spike
        lag_days: [0, 7]
      - description: Contagion spreads to peer EM economies
        observable: Other EM currencies sell off, EM credit spreads widen broadly
        lag_days: [3, 14]
      - description: Global risk appetite falls, flight to safety
        observable: DXY rallies, Treasuries bid, EM equities sell off broadly
        lag_days: [5, 21]
