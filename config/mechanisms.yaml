  - id: btc_halving_supply_shock
    name: Bitcoin Halving Supply Shock
    category: crypto
    description: >
      Every ~4 years, Bitcoin block rewards are cut 50%, reducing new BTC
      issuance and doubling the stock-to-flow ratio overnight. Each of the
      four halvings (2012, 2016, 2020, 2024) preceded a major bull run within
      6-18 months. PlanB's Stock-to-Flow model (2019) formalized this;
      Fantazzini & Kolodin (2020) provide econometric testing. The mechanism
      is endogenous supply: halving → miner revenue halved → reduced sell
      pressure → supply deficit against steady/growing demand → price
      appreciation. Entirely distinct from the liquidity proxy — this is an
      endogenous supply mechanism, not an exogenous liquidity one.
    trigger_sources:
      - market_data
      - news
      - social
      - google_trends
    trigger_keywords:
      - halving
      - halvening
      - block reward
      - stock to flow
      - S2F
      - miner reward
      - BTC issuance
      - supply shock
      - miner revenue
      - hash rate
      - miner capitulation
    chain_steps:
      - description: Halving event reduces block rewards by 50%
        observable: Block reward drops (e.g., 6.25 → 3.125 BTC); known date in advance
        lag_days: [0, 0]
      - description: Miner sell pressure declines as revenue adjusts
        observable: Miner outflows to exchanges decrease; weaker miners capitulate
        lag_days: [0, 90]
      - description: Supply deficit develops against steady or growing demand
        observable: Exchange balances decline; long-term holder supply increases
        lag_days: [30, 180]
      - description: Price appreciation as supply scarcity is priced in
        observable: BTC breaks prior cycle highs; new ATH within 6-18 months post-halving
        lag_days: [90, 540]
    asset_impacts:
      - ticker: Bitcoin
        asset_class: crypto
        direction: bullish
        sensitivity: high
        lag_days: [90, 540]
      - ticker: Ethereum
        asset_class: crypto
        direction: bullish
        sensitivity: medium
        lag_days: [120, 540]
      - ticker: Solana
        asset_class: crypto
        direction: bullish
        sensitivity: medium
        lag_days: [150, 540]
    confirmation_criteria:
      - Exchange BTC balances declining post-halving
      - Miner selling pressure (miner-to-exchange flows) decreasing
      - Long-term holder supply ratio increasing
    invalidation_criteria:
      - Macro liquidity crunch overwhelms supply dynamics
      - Regulatory shock creates existential demand destruction
      - Mining economics shift fundamentally (e.g., fee revenue dominates rewards)

  - id: crypto_leverage_liquidation
    name: Crypto Leverage Liquidation Cascade
    category: crypto
    description: >
      On-chain and exchange-based leverage (perpetual futures, margin) builds
      up → price decline hits liquidation thresholds → forced selling →
      cascading liquidations → flash crash → funding rates flip deeply
      negative → eventual mean reversion. Crypto-specific market microstructure
      mechanism with no direct analog in traditional macro. Makarov & Schoar
      (2020, Journal of Finance) cover crypto exchange microstructure;
      Alexander & Heck (2020) document leveraged position dynamics. The May
      2021 crash ($58K → $30K) saw >$8B in liquidations in 24 hours. The
      mechanism is reflexive — high leverage creates fragility, and the unwind
      amplifies moves far beyond what fundamentals justify.
    trigger_sources:
      - market_data
      - social
      - spreads
    trigger_keywords:
      - liquidation
      - liquidation cascade
      - funding rate
      - open interest
      - leverage
      - margin call
      - perpetual futures
      - long squeeze
      - short squeeze
      - Coinglass
      - rekt
      - forced selling
    chain_steps:
      - description: Leverage builds to fragile levels
        observable: Open interest as % of market cap elevated; funding rates >0.1%; liquidation clusters visible
        lag_days: [0, 7]
      - description: Price decline triggers initial liquidation wave
        observable: Price drops >5%, first wave of long liquidations fires
        lag_days: [0, 1]
      - description: Cascading liquidations amplify the crash
        observable: "$1B+ liquidations in 24h; funding rates flip deeply negative; flash crash"
        lag_days: [0, 1]
      - description: Mean reversion as leverage is flushed
        observable: Open interest drops >30%; funding rates normalize; price stabilizes and bounces
        lag_days: [1, 7]
    asset_impacts:
      - ticker: Bitcoin
        asset_class: crypto
        direction: bearish
        sensitivity: high
        lag_days: [0, 1]
      - ticker: Ethereum
        asset_class: crypto
        direction: bearish
        sensitivity: high
        lag_days: [0, 1]
      - ticker: Solana
        asset_class: crypto
        direction: bearish
        sensitivity: high
        lag_days: [0, 1]
    confirmation_criteria:
      - Open interest drops >30% in 24-48 hours
      - Total liquidations exceed $1B in a day
      - Funding rates flip negative across major exchanges
    invalidation_criteria:
      - New leverage re-builds quickly (cascade wasn't deep enough)
      - Macro catalyst overrides the technical flush
      - Exchange intervention (circuit breakers, insurance fund deployment)

  - id: stablecoin_contagion
    name: Stablecoin Contagion / De-peg Risk
    category: crypto
    description: >
      A stablecoin loses its peg → forced redemptions → backing assets
      fire-sold → crypto-wide liquidity crisis. Terra/Luna (May 2022) is the
      canonical case: UST de-peg → $40B wiped out → BTC collateral liquidated
      → contagion to 3AC, Celsius, Voyager, eventually FTX. Distinct from
      regulatory shock (which is policy-driven) — this is endogenous financial
      contagion within the crypto ecosystem. Lyons & Viswanath-Natraj (2023)
      on stablecoin stability mechanisms. Observable via stablecoin market cap
      changes, USDT/USDC premium/discount, Curve 3pool imbalances.
    trigger_sources:
      - market_data
