        direction: bullish
        sensitivity: medium
        lag_days: [0, 7]
      - ticker: Gold
        asset_class: metals
        direction: bullish
        sensitivity: medium
        lag_days: [0, 7]
      - ticker: AUD/USD
        asset_class: fx
        direction: bearish
        sensitivity: high
        lag_days: [0, 7]
      - ticker: Copper
        asset_class: metals
        direction: bearish
        sensitivity: medium
        lag_days: [3, 14]
      - ticker: S&P 500
        asset_class: indices
        direction: bearish
        sensitivity: low
