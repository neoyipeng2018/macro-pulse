      production and commodity demand by 6-12 months. Documented by Bianco
      Research and BIS. Primary transmission channel for copper, iron ore, AUD,
      and EM equities. Distinct from global liquidity expansion (which is about
      G4 central bank balance sheets / M2) — China credit impulse is about
      private credit creation in the world's marginal commodity consumer.
    trigger_sources:
