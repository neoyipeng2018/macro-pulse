  # ============================================================================
  # FISCAL & SOVEREIGN (1)
  # ============================================================================

  - id: fiscal_dominance
    name: Fiscal Dominance
    category: fiscal
    description: >
      Government deficits become large enough that monetary policy is
      effectively constrained by fiscal needs. Sargent & Wallace (1981),
      "Some Unpleasant Monetarist Arithmetic." Increasingly relevant post-COVID
      with debt/GDP ratios at wartime levels. Transmission: large fiscal
      deficits → bond supply pressure → central bank forced to accommodate →
      inflation persistence. The term premium mechanism captures the bond
      market symptom, but fiscal dominance is a broader regime where the
      entire monetary policy transmission changes.
    trigger_sources:
      - economic_data
      - news
      - central_bank
      - spreads
      - prediction_market
    trigger_keywords:
      - fiscal dominance
      - debt to GDP
      - fiscal deficit
      - debt sustainability
      - bond vigilantes
      - debt spiral
      - interest expense
      - CBO projection
      - fiscal space
      - unfunded liabilities
      - Truss moment
      - gilt crisis
      - sovereign risk
    chain_steps:
      - description: Fiscal deficit exceeds sustainable threshold
        observable: Deficit/GDP >6%, interest expense/revenue rising, CBO warnings
        lag_days: [0, 30]
      - description: Bond market demands higher term premium
        observable: Long-end yields rise, auction demand weakens, bid-to-cover falls
        lag_days: [7, 60]
      - description: Central bank constrained or forced to accommodate
        observable: Fed buys bonds to cap yields or rhetoric signals fiscal concerns
        lag_days: [30, 180]
      - description: Inflation persistence as monetary discipline erodes
        observable: Breakevens rise, inflation prints sticky, real rates suppressed
        lag_days: [60, 360]
    asset_impacts:
      - ticker: TLT
        asset_class: bonds
        direction: bearish
        sensitivity: high
        lag_days: [7, 60]
      - ticker: US 10Y Yield
        asset_class: bonds
        direction: bullish
        sensitivity: high
        lag_days: [7, 60]
      - ticker: US 30Y Yield
        asset_class: bonds
        direction: bullish
        sensitivity: high
        lag_days: [7, 60]
      - ticker: Gold
        asset_class: metals
        direction: bullish
        sensitivity: high
        lag_days: [14, 90]
      - ticker: Bitcoin
        asset_class: crypto
        direction: bullish
        sensitivity: medium
        lag_days: [14, 90]
      - ticker: DXY
        asset_class: fx
        direction: bearish
        sensitivity: medium
        lag_days: [30, 180]
      - ticker: S&P 500
        asset_class: indices
        direction: bearish
        sensitivity: medium
        lag_days: [30, 120]
      - ticker: Nasdaq
        asset_class: indices
        direction: bearish
        sensitivity: high
        lag_days: [14, 60]
    confirmation_criteria:
      - Federal interest expense exceeds defense spending
      - Treasury auction tails frequent (>2bp tail 3+ times in a month)
      - Debt/GDP trajectory exceeds CBO baseline projections
    invalidation_criteria:
      - Fiscal consolidation (spending cuts or tax increases)
      - Strong nominal GDP growth reduces debt/GDP ratio
      - Foreign demand for Treasuries remains robust

  # ============================================================================
  # CB POLICY DIVERGENCE (1)
  # ============================================================================

  - id: cb_policy_divergence
    name: Central Bank Policy Divergence
    category: fx_specific
    description: >
      Major central banks move in opposite directions — e.g., Fed hiking while
      BoJ holds, or ECB cutting while Fed holds. Engel & West (2005) on
      exchange rates and fundamentals. Primary driver of major FX trends beyond
      Fed-centric mechanisms. The EUR/USD move from 1.22 to 0.96 in 2022 was
      almost entirely a divergence trade (Fed hiking aggressively, ECB lagging).
      Captures cross-rate dynamics driven by relative policy rather than
      absolute USD direction.
    trigger_sources:
      - central_bank
      - economic_data
      - spreads
      - news
      - market_data
    trigger_keywords:
      - policy divergence
      - rate differential
      - ECB
      - BoJ
      - BoE
      - central bank divergence
      - relative policy
      - 2Y spread
      - swap rate differential
      - monetary policy gap
      - interest rate gap
    chain_steps:
      - description: Central banks signal or execute divergent policy paths
        observable: One bank hikes/holds while another cuts; forward guidance diverges
        lag_days: [0, 3]
      - description: Rate differentials widen
        observable: 2Y swap spread widens between economies; carry attractiveness shifts
        lag_days: [0, 7]
      - description: FX cross-rates trend in direction of rate differential
        observable: Currency of hiking bank strengthens; currency of cutting bank weakens
        lag_days: [3, 30]
      - description: Capital flows reinforce FX move
        observable: Portfolio flows shift toward higher-yielding economy; FX vol elevated
        lag_days: [14, 90]
    asset_impacts:
      - ticker: EUR/USD
        asset_class: fx
        direction: neutral
        sensitivity: high
        lag_days: [0, 14]
      - ticker: USD/JPY
        asset_class: fx
        direction: neutral
        sensitivity: high
        lag_days: [0, 14]
      - ticker: GBP/USD
        asset_class: fx
        direction: neutral
        sensitivity: high
        lag_days: [0, 14]
      - ticker: DXY
        asset_class: fx
        direction: neutral
        sensitivity: medium
        lag_days: [0, 14]
      - ticker: Gold
        asset_class: metals
        direction: neutral
        sensitivity: low
        lag_days: [7, 30]
    confirmation_criteria:
      - 2Y swap spread between major economies widens >100bp
      - FX pair trend aligns with rate differential direction for 3+ months
      - Forward rate agreements price continued divergence
    invalidation_criteria:
      - Central banks converge (both cut or both hold)
      - Growth shock forces policy alignment
      - FX intervention disrupts rate-differential signaling

  # ============================================================================
  # COMMODITY STRUCTURAL (1)
  # ============================================================================

  - id: commodity_supercycle
    name: Commodity Supercycle
    category: commodity
    description: >
      Long-duration (10-20 year) structural bull/bear cycles driven by capex
      underinvestment → supply deficit → price spike → capex boom → oversupply.
      Erten & Ocampo (2013), "Super Cycles of Commodity Prices since the
      Mid-Nineteenth Century." Distinct from energy supply shock (which is
      acute/event-driven) — this is a multi-year structural mechanism relevant
      for strategic allocation. Current cycle driven by decade of upstream
      underinvestment, energy transition metal demand, and ESG-driven capex
      constraints.
    trigger_sources:
      - economic_data
      - market_data
      - news
    trigger_keywords:
      - supercycle
      - capex underinvestment
      - supply deficit
      - mine supply
      - upstream investment
      - commodity cycle
      - energy transition metals
      - lithium
      - uranium
      - greenflation
      - resource nationalism
      - critical minerals
    chain_steps:
      - description: Structural supply deficit emerges from years of underinvestment
        observable: Inventory-to-consumption ratios at multi-year lows; capex/depreciation <1
        lag_days: [0, 180]
      - description: Prices begin sustained uptrend as deficit draws inventories
        observable: Commodity prices break above long-term moving averages; backwardation
        lag_days: [90, 360]
      - description: Producers respond with capex but supply lag persists
        observable: Mining capex announcements increase but new supply 3-7 years away
        lag_days: [360, 1800]
      - description: Broad commodity complex re-rates
        observable: Commodity equities re-rate; commodity currencies strengthen
        lag_days: [180, 720]
    asset_impacts:
      - ticker: Copper
        asset_class: metals
        direction: bullish
        sensitivity: high
        lag_days: [90, 720]
      - ticker: WTI Crude
        asset_class: energy
        direction: bullish
        sensitivity: high
        lag_days: [90, 720]
      - ticker: Gold
        asset_class: metals
        direction: bullish
        sensitivity: medium
        lag_days: [90, 720]
      - ticker: Silver
        asset_class: metals
        direction: bullish
        sensitivity: high
        lag_days: [90, 720]
      - ticker: AUD/USD
        asset_class: fx
        direction: bullish
        sensitivity: high
        lag_days: [90, 360]
      - ticker: USD/CAD
        asset_class: fx
        direction: bearish
        sensitivity: medium
        lag_days: [90, 360]
      - ticker: S&P 500
        asset_class: indices
        direction: neutral
        sensitivity: low
        lag_days: [180, 720]
    confirmation_criteria:
      - Commodity/equity ratio (GSCI/S&P 500) trending higher for 12+ months
      - Global upstream capex remains below replacement level
      - Inventory-to-consumption ratios at multi-decade lows
    invalidation_criteria:
      - Demand destruction from recession overwhelms supply deficit
      - Technological breakthrough expands supply rapidly
      - Major new supply sources discovered and developed

  - id: crypto_leverage_flush
    name: Crypto Leverage Flush
    category: crypto
    description: >
      Extreme one-sided positioning in perpetual futures triggers cascading
      liquidations. Funding rates and OI are the leading indicators; the flush
      itself is a 12-48 hour event that resets positioning for the next move.
    trigger_sources:
      - derivatives_consensus
      - funding_rates
      - options
    trigger_keywords:
      - extreme funding
      - liquidation cascade
      - OI spike
      - leverage flush
      - crowded long
      - crowded short
    chain_steps:
      - description: Funding rates reach extreme levels (>0.05% or <-0.03% per 8h)
        observable: Persistent extreme funding across 3+ settlement periods
        lag_days: [0, 3]
      - description: Open interest reaches cycle high/low
        observable: OI at 90th+ percentile of 30-day range
        lag_days: [0, 2]
      - description: Initial liquidation cascade begins
        observable: >$100M liquidations in 1 hour; OI drops >10% in 24h
        lag_days: [0, 1]
      - description: Spot buying/selling absorbs at key level
        observable: Price stabilizes at major support/resistance; funding normalizes
        lag_days: [1, 3]
    asset_impacts:
      - ticker: Bitcoin
        asset_class: crypto
        direction: bearish
        sensitivity: very_high
        lag_days: [0, 2]
      - ticker: Ethereum
        asset_class: crypto
        direction: bearish
        sensitivity: very_high
        lag_days: [0, 2]
    confirmation_criteria:
      - OI drops >15% from peak
      - Funding rate normalizes to ±0.01%
    invalidation_criteria:
      - Price makes new highs despite extreme funding (strong spot demand)
      - ETF inflows accelerate during the flush

  - id: stablecoin_supply_expansion
    name: Stablecoin Supply Expansion
    category: crypto
    description: >
      Stablecoin minting (especially USDT offshore and USDC onshore) signals
