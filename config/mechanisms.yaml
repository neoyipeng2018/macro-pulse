  - id: credit_cycle_ebp
    name: Credit Cycle / Excess Bond Premium
    category: credit
    description: >
      The excess bond premium (EBP) — the component of credit spreads not
      explained by default risk (Gilchrist & Zakrajsek 2012, AER) — captures
      tightening credit conditions that transmit through financial conditions
      to the real economy. HY OAS widening beyond 500bp has preceded every
      recession. Distinct from generic risk-off: this is the specific channel
      of credit availability contracting → financial conditions tightening →
      real economy weakening.
    trigger_sources:
      - spreads
      - market_data
      - economic_data
      - news
    trigger_keywords:
      - credit spreads
      - high yield
      - HY OAS
      - excess bond premium
      - credit conditions
      - lending standards
      - financial conditions
      - credit tightening
      - investment grade
      - corporate bonds
      - SLOOS
      - loan officer survey
    chain_steps:
      - description: Credit spreads widen beyond default-risk fundamentals
        observable: HY OAS widens >100bp; IG spreads widen; EBP rises
        lag_days: [0, 5]
      - description: Financial conditions tighten
        observable: Chicago Fed FCI tightens; Goldman FCI rises; bank lending standards tighten
        lag_days: [5, 30]
      - description: Credit availability contracts
        observable: SLOOS shows tighter standards; loan growth slows; issuance drops
        lag_days: [14, 60]
      - description: Real economy impact materializes
        observable: Capex declines, hiring slows, small business sentiment drops
        lag_days: [30, 120]
    asset_impacts:
      - ticker: S&P 500
        asset_class: indices
        direction: bearish
        sensitivity: high
        lag_days: [5, 30]
      - ticker: Russell 2000
        asset_class: indices
        direction: bearish
        sensitivity: high
        lag_days: [5, 30]
      - ticker: TLT
        asset_class: bonds
        direction: bullish
        sensitivity: high
        lag_days: [7, 30]
      - ticker: US 10Y Yield
        asset_class: bonds
        direction: bearish
        sensitivity: medium
        lag_days: [7, 30]
      - ticker: Gold
        asset_class: metals
        direction: bullish
        sensitivity: medium
        lag_days: [7, 30]
      - ticker: DXY
        asset_class: fx
        direction: bullish
        sensitivity: medium
        lag_days: [5, 14]
      - ticker: Bitcoin
        asset_class: crypto
        direction: bearish
        sensitivity: medium
        lag_days: [5, 14]
      - ticker: Copper
        asset_class: metals
        direction: bearish
        sensitivity: medium
        lag_days: [14, 60]
    confirmation_criteria:
      - HY OAS sustained above 500bp
      - SLOOS shows net tightening for 2+ quarters
      - Investment grade issuance drops >30% YoY
    invalidation_criteria:
      - Spreads tighten back to normal on policy intervention
      - SLOOS reverses to easing
      - Strong earnings growth overrides credit headwinds

  - id: banking_stress_contagion
    name: Banking Stress Contagion
    category: credit
    description: >
      Bank failures trigger deposit flight, credit contraction, and real
      economy drag through the credit channel. Diamond & Dybvig (1983) is the
      canonical model; SVB/Signature/First Republic (March 2023) is the recent
      empirical case. Distinct from generic risk-off: the transmission is
      specifically through credit channel impairment — surviving banks tighten
      lending standards → small business/CRE stress → employment impact.
    trigger_sources:
      - news
      - market_data
      - spreads
      - social
      - google_trends
    trigger_keywords:
      - bank failure
      - bank run
      - deposit flight
      - FDIC
      - bank stress
      - regional banks
      - CRE exposure
      - commercial real estate
      - uninsured deposits
      - bank contagion
      - SVB
      - lending standards
    chain_steps:
      - description: Bank failure or acute stress event
        observable: Bank stock collapse, FDIC intervention, deposit flight reports
        lag_days: [0, 1]
      - description: Contagion fears spread to peer banks
        observable: Regional bank index (KRE) drops >10%; CDS on banks spike
        lag_days: [0, 5]
      - description: Surviving banks tighten lending standards
        observable: SLOOS shows sharp tightening; loan growth contracts
        lag_days: [7, 30]
      - description: Credit channel impairment hits real economy
        observable: Small business credit access drops; CRE defaults rise; employment weakens
        lag_days: [30, 120]
    asset_impacts:
      - ticker: S&P 500
        asset_class: indices
        direction: bearish
        sensitivity: high
        lag_days: [0, 7]
      - ticker: Russell 2000
        asset_class: indices
        direction: bearish
        sensitivity: high
        lag_days: [0, 7]
      - ticker: TLT
        asset_class: bonds
        direction: bullish
        sensitivity: high
        lag_days: [0, 5]
      - ticker: US 10Y Yield
        asset_class: bonds
        direction: bearish
        sensitivity: high
        lag_days: [0, 5]
      - ticker: Gold
        asset_class: metals
        direction: bullish
        sensitivity: medium
        lag_days: [0, 7]
      - ticker: DXY
        asset_class: fx
        direction: bullish
        sensitivity: low
        lag_days: [1, 7]
      - ticker: Bitcoin
        asset_class: crypto
        direction: bearish
        sensitivity: medium
        lag_days: [0, 7]
    confirmation_criteria:
      - Multiple bank failures or FDIC interventions
      - KRE index sustained >20% below prior level
      - SLOOS shows sharp lending standard tightening
    invalidation_criteria:
      - Fed emergency lending facilities stabilize deposits
      - Contagion contained to isolated institutions
      - Bank earnings recover and lending resumes

