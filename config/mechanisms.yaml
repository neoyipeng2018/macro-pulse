        sensitivity: high
        lag_days: [0, 7]
      - ticker: Ethereum
        asset_class: crypto
        direction: bearish
        sensitivity: high
        lag_days: [0, 7]
      - ticker: Solana
        asset_class: crypto
        direction: bearish
        sensitivity: high
        lag_days: [0, 7]
      - ticker: Gold
        asset_class: metals
        direction: neutral
        sensitivity: low
        lag_days: [3, 14]
      - ticker: TLT
        asset_class: bonds
        direction: neutral
        sensitivity: low
        lag_days: [3, 14]
    confirmation_criteria:
