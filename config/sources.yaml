# Data sources configuration for macro-pulse v2
# Crypto-focused with macro context

enabled_collectors:
  # === CORE (always on) ===
  - market_data
  - fear_greed
  - funding_rates
  - onchain
  - news
  - reddit
  - spreads

  # === MACRO CONTEXT (re-enabled) ===
  - economic_data

  # === NEW: On-Chain ===
  - mempool
  - eth_onchain

  # === NEW: Social (Agent-Reach) — optional ===
  # Requires: npm install -g xreach
  # - twitter_crypto
  # Requires: pip install yt-dlp
  # - youtube_crypto
  # Requires: pip install mcporter
  # - exa_news

  # === REMOVED (unreliable) ===
  # - google_trends

rss_feeds:
  crypto:
    - https://cointelegraph.com/rss
    - https://www.coindesk.com/arc/outboundfeeds/rss/
    - https://thedefiant.io/feed
    - https://www.theblock.co/rss.xml

subreddits:
  - CryptoCurrency
  - CryptoMarkets
  - ethfinance
  - BitcoinMarkets

fred_series:
  - id: DFF
    name: Federal Funds Rate
  - id: T10Y2Y
    name: 10Y-2Y Treasury Spread
  - id: T10YIE
    name: 10Y Breakeven Inflation
  - id: STLFSI2
    name: St. Louis Fed Financial Stress Index
  - id: BAMLH0A0HYM2
    name: HY OAS Spread
  - id: DGS2
    name: 2Y Treasury Yield

funding_rates:
  symbols: [BTC, ETH, SOL]
  extreme_long_threshold: 0.05
  extreme_short_threshold: -0.03

onchain:
  stablecoin_decline_alert_pct: -1.0

mempool:
  enabled_metrics:
    - difficulty_adjustment
    - hashrate
    - fees
    - mining_pools

twitter_crypto:
  accounts:
    - "100trillionUSD"
    - "CryptoHayes"
    - "zaborow"
    - "inversebrah"
    - "EmberCN"
  searches:
    - "bitcoin liquidation"
    - "crypto regulation"
    - "stablecoin mint"
    - "ETH unlock"
